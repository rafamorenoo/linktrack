services:
  postgres:
    image: postgres:16-alpine
    container_name: linktrack-postgres
    environment:
      POSTGRES_DB: linktrack
      POSTGRES_USER: linktrack
      POSTGRES_PASSWORD: linktrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linktrack"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: linktrack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  localstack:
    image: localstack/localstack:3
    container_name: linktrack-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,ses
      - DEFAULT_REGION=eu-west-1
    volumes:
      - localstack_data:/var/lib/localstack
volumes:
  postgres_data:
  redis_data:
  localstack_data:
